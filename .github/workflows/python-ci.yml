name: Python CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Stockfish
        run: sudo apt-get install -y stockfish

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install chess pandas numpy pyarrow stockfish \
                      gensim scikit-learn joblib scipy tqdm \
                      zstandard requests pytest pytest-timeout

      - name: Install HDBSCAN and UMAP
        run: pip install hdbscan umap-learn
        continue-on-error: true

      - name: Run parser tests
        run: pytest tests/test_parser.py -v

      - name: Run feature tests
        run: pytest tests/test_features.py -v

      - name: Run evaluator tests
        run: pytest tests/test_evaluator.py -v

      - name: Run stream tests
        run: pytest tests/test_stream.py -v

      - name: Run analyze tests
        run: pytest tests/test_analyze.py -v

      - name: Run archetype tests
        run: pytest tests/test_archetypes.py -v
        continue-on-error: true

      - name: Run recommender tests
        run: pytest tests/test_recommender.py -v
        continue-on-error: true

      - name: Lint
        run: |
          pip install ruff
          ruff check chessvision/ --ignore E501,F401,F841,F541
