[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "chessvision-py"
version = "0.1.0"
description = "Python library for computational chess performance analysis"
requires-python = ">=3.10"
dependencies = [
    "chess==1.11.2",
    "stockfish==4.0.8",
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "pyarrow>=23.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "black>=24.0.0",
    "ruff>=0.4.0",
]

[tool.pytest.ini_options]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"